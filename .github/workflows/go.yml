name: Go Backend Build

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build
      run: |
        cd backend
        go build -v -o local_messenger_backend ./cmd/server.go

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-binary
        path: backend/local_messenger_backend
