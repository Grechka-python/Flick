name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Запуск при создании тега v1.0.0, v1.1.0 и т.д.
  workflow_dispatch:  # Ручной запуск из интерфейса GitHub

jobs:
  build-backend:
    name: Build Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build for Linux
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -o local_messenger_backend_linux_amd64 ./cmd/server.go
      
      - name: Build for Windows
        run: |
          cd backend
          GOOS=windows GOARCH=amd64 go build -o local_messenger_backend_windows_amd64.exe ./cmd/server.go
      
      - name: Build for macOS
        run: |
          cd backend
          GOOS=darwin GOARCH=amd64 go build -o local_messenger_backend_darwin_amd64 ./cmd/server.go
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-binaries
          path: backend/local_messenger_backend_*

  build-frontend:
    name: Build Flutter Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Install dependencies
        run: |
          cd frontend
          flutter pub get
      
      - name: Build for Web
        run: |
          cd frontend
          flutter build web --release
      
      - name: Build for Linux Desktop
        run: |
          cd frontend
          flutter build linux --release
      
      - name: Build for Windows Desktop
        run: |
          cd frontend
          flutter build windows --release
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-builds
          path: |
            frontend/build/web/
            frontend/build/linux/
            frontend/build/windows/

  create-release:
    name: Create Release
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/backend-binaries/*
            artifacts/frontend-builds/web/
            artifacts/frontend-builds/linux/
            artifacts/frontend-builds/windows/
          generate_release_notes: true
