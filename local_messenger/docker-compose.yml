version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: local_messenger_db
    environment:
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger_password
      POSTGRES_DB: local_messenger
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - messenger_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO объектное хранилище
  minio:
    image: minio/minio:latest
    container_name: local_messenger_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - messenger_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backend сервер
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: local_messenger_backend
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: postgres://messenger:messenger_password@postgres:5432/local_messenger?sslmode=disable
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - messenger_network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  messenger_network:
    driver: bridge
