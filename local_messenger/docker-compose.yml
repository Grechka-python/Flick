version: '3.8'

services:
  # PostgreSQL - основная база данных
  postgres:
    image: postgres:15-alpine
    container_name: messenger_postgres
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: messenger_user
      POSTGRES_PASSWORD: secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - messenger_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - объектное хранилище для файлов
  minio:
    image: minio/minio:latest
    container_name: messenger_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    networks:
      - messenger_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Redis - кэш и pub/sub
  redis:
    image: redis:7-alpine
    container_name: messenger_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - messenger_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Приложение (опционально, можно запускать отдельно)
  app:
    build: .
    container_name: messenger_app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=messenger
      - DB_USER=messenger_user
      - DB_PASSWORD=secure_password
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_HOST=redis
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - messenger_network
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  messenger_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
